<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator - Semester 2</title>
    
    <style>
        :root {
            --primary-color: #f1f5f9;
            --accent-color: #38bdf8;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #cbd5e1;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* Cards and Elements */
        .subject-card {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
        }

        .subject-card:last-of-type {
            border-bottom: none;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .subject-title {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 15px;
        }

        .subject-coef {
            font-size: 11px;
            background: #334155;
            color: #94a3b8;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .inputs-grid.two-cols {
            grid-template-columns: repeat(2, 1fr);
        }

        .inputs-grid.one-col {
            grid-template-columns: 1fr;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            background: #0f172a;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            background: #1e293b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn-calc {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 30px;
        }

        .btn-calc:hover {
            background-color: #7dd3fc;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            display: none;
        }

        .success {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .fail {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        footer {
            text-align: center;
            margin-top: 35px;
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9SSLLBJD4P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-9SSLLBJD4P');
    </script>
</head>
<body>

<div class="container">
    <h1>Grade Calculator</h1>
    <h2>Semester 2</h2>
    
    <form id="s2-form">
        <div class="subject-card" data-coef="4">
            <div class="subject-header">
                <span class="subject-title">Thermodynamics</span>
                <span class="subject-coef">Coef 4</span>
            </div>
            <div class="inputs-grid">
                <div class="input-group"><label>EXAM</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
                <div class="input-group"><label>TD</label><input type="number" step="0.01" min="0" max="20" class="td"></div>
                <div class="input-group"><label>TP</label><input type="number" step="0.01" min="0" max="20" class="tp"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="4">
            <div class="subject-header">
                <span class="subject-title">Electricity & Magnetism</span>
                <span class="subject-coef">Coef 4</span>
            </div>
            <div class="inputs-grid">
                <div class="input-group"><label>EXAM</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
                <div class="input-group"><label>TD</label><input type="number" step="0.01" min="0" max="20" class="td"></div>
                <div class="input-group"><label>TP</label><input type="number" step="0.01" min="0" max="20" class="tp"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="3">
            <div class="subject-header">
                <span class="subject-title">Analyse 2</span>
                <span class="subject-coef">Coef 3</span>
            </div>
            <div class="inputs-grid two-cols">
                <div class="input-group"><label>EXAM</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
                <div class="input-group"><label>TD</label><input type="number" step="0.01" min="0" max="20" class="td"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="2">
            <div class="subject-header">
                <span class="subject-title">Algebre 2</span>
                <span class="subject-coef">Coef 2</span>
            </div>
            <div class="inputs-grid two-cols">
                <div class="input-group"><label>EXAM</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
                <div class="input-group"><label>TD</label><input type="number" step="0.01" min="0" max="20" class="td"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="2">
            <div class="subject-header">
                <span class="subject-title">FOSS</span>
                <span class="subject-coef">Coef 2</span>
            </div>
            <div class="inputs-grid one-col">
                <div class="input-group"><label>MARK</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="2">
            <div class="subject-header">
                <span class="subject-title">Dessin Technique</span>
                <span class="subject-coef">Coef 2</span>
            </div>
            <div class="inputs-grid one-col">
                <div class="input-group"><label>MARK</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
            </div>
        </div>

        <div class="subject-card" data-coef="2">
            <div class="subject-header">
                <span class="subject-title">Informatique 2</span>
                <span class="subject-coef">Coef 2</span>
            </div>
            <div class="inputs-grid one-col">
                <div class="input-group"><label>MARK</label><input type="number" step="0.01" min="0" max="20" required class="exam"></div>
            </div>
        </div>

        <button type="button" class="btn-calc" onclick="calculateS2()">Calculate Semester 2 Average</button>
    </form>
    
    <div id="s2-result" class="result-box"></div>

    <footer>
        By Farouk © 2026
    </footer>
</div>

<script>
    // Calculating S2 Average
    function calculateS2() {
        const cards = document.querySelectorAll('.subject-card');
        let totalPoints = 0;
        let totalCoefficients = 0;
        let allInputsValid = true;

        cards.forEach(card => {
            const coef = parseFloat(card.getAttribute('data-coef'));
            const examInput = card.querySelector('.exam');
            const tdInput = card.querySelector('.td');
            const tpInput = card.querySelector('.tp');

            if (!examInput.value || examInput.value < 0 || examInput.value > 20) {
                allInputsValid = false;
                examInput.style.borderColor = '#ef4444';
                return;
            } else {
                examInput.style.borderColor = '#334155';
            }

            const examValue = parseFloat(examInput.value);
            let ccValue = 0;
            let ccCount = 0;

            if (tdInput && tdInput.value !== "") {
                ccValue += parseFloat(tdInput.value);
                ccCount++;
            }
            if (tpInput && tpInput.value !== "") {
                ccValue += parseFloat(tpInput.value);
                ccCount++;
            }

            let subjectMoyenne = 0;
            if (ccCount > 0) {
                const finalCC = ccValue / ccCount;
                subjectMoyenne = (examValue * 0.6) + (finalCC * 0.4);
            } else {
                subjectMoyenne = examValue;
            }

            totalPoints += (subjectMoyenne * coef);
            totalCoefficients += coef;
        });

        if (!allInputsValid) {
            alert("Please ensure all required exam fields are filled correctly (0-20).");
            return;
        }

        const finalMoyenne = totalPoints / totalCoefficients;
        const resultBox = document.getElementById('s2-result');
        
        resultBox.style.display = 'block';
        resultBox.innerHTML = `Semester 2 Average: ${finalMoyenne.toFixed(2)} / 20`;

        if (finalMoyenne >= 10) {
            resultBox.className = 'result-box success';
        } else {
            resultBox.className = 'result-box fail';
        }
    }
</script>

</body>
</html>
